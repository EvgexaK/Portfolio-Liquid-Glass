name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Ensure target directory exists
            mkdir -p /var/www/html
            cd /var/www/html
            
            # Initialize or re-initialize git if needed
            if [ ! -d ".git" ]; then
              rm -rf * .??*
              git clone https://github.com/EvgexaK/Portfolio-Liquid-Glass.git .
            fi
            
            # Force set remote to ensure it's correct
            git remote set-url origin https://github.com/EvgexaK/Portfolio-Liquid-Glass.git
            
            # Force fetch and reset
            git fetch --all
            git reset --hard origin/master
            # NOTE: git clean -fd is REMOVED to prevent wiping untracked files like Projects symlinks

            # DEPLOYMENT REPAIR 1.5 - With Persistent Projects
            
            # 1. Create a safe temp directory for valid clone
            rm -rf /tmp/portfolio_clone
            git clone https://github.com/EvgexaK/Portfolio-Liquid-Glass.git /tmp/portfolio_clone
            
            # 2. Verify we actually got the files
            if [ ! -f "/tmp/portfolio_clone/index.html" ]; then
                echo "CRITICAL: Git clone failed to get index.html" > /var/www/html/error.txt
                exit 1
            fi
            
            # 2.5 Sync Git-tracked Projects to Persistent Storage
            if [ -d "/tmp/portfolio_clone/Projects" ]; then
                mkdir -p /srv/portfolio-projects
                cp -r /tmp/portfolio_clone/Projects/* /srv/portfolio-projects/ 2>/dev/null || true
                rm -rf /tmp/portfolio_clone/Projects
            fi

            # 3. Clean and Populate /var/www/html (Careful with existing symlinks)
            # Remove all tracked files but LEAVE the Projects symlink if it exists
            find /var/www/html -maxdepth 1 -mindepth 1 ! -name 'Projects' -exec rm -rf {} +
            cp -r /tmp/portfolio_clone/* /var/www/html/
            
            # 4. Create Debug Files
            echo "VERSION 1.5 - PERSISTENT PROJECTS $(date)" > /var/www/html/version.txt
            ls -la /var/www/html/ > /var/www/html/filelist.txt
            
            # 5. Bruteforce Permissions (Common 403 fix)
            find /var/www/html -type d -exec chmod 755 {} \;
            find /var/www/html -type f -exec chmod 644 {} \;
            
            # 6. Copy to alternate root just in case
            mkdir -p /var/www/zhdanov.design
            find /var/www/zhdanov.design -maxdepth 1 -mindepth 1 ! -name 'Projects' -exec rm -rf {} +
            cp -r /var/www/html/* /var/www/zhdanov.design/
            
            # 7. Copy to Mail-in-a-Box managed web roots (MIAB serves from these)
            mkdir -p /home/user-data/www/default
            mkdir -p /home/user-data/www/zhdanov.design
            find /home/user-data/www/default -maxdepth 1 -mindepth 1 ! -name 'Projects' -exec rm -rf {} +
            find /home/user-data/www/zhdanov.design -maxdepth 1 -mindepth 1 ! -name 'Projects' -exec rm -rf {} +
            cp -r /var/www/html/* /home/user-data/www/default/
            cp -r /var/www/html/* /home/user-data/www/zhdanov.design/

            # 8. Ensure Projects is symlinked correctly in ALL roots to the persistent storage
            for DIR in /var/www/html /var/www/zhdanov.design /home/user-data/www/default /home/user-data/www/zhdanov.design; do
                rm -rf $DIR/Projects
                ln -sfn /srv/portfolio-projects $DIR/Projects
                chown -R www-data:www-data $DIR
            done
            
            # 9. Reload Nginx
            systemctl reload nginx
